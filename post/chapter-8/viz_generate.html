<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Performance Metrics Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #3498db, #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chart-container {
            margin: 40px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .chart-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
            text-align: center;
        }
        canvas {
            max-height: 400px;
        }
        .download-btn {
            background: linear-gradient(45deg, #3498db, #2ecc71);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .metric-value {
            font-size: 2em;
            font-weight: bold;
        }
        .metric-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 LLM Performance Metrics Generator</h1>
        
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-value">12.3K+</div>
                <div class="metric-label">Requests/Second</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">42ms</div>
                <div class="metric-label">P50 Latency</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">70%</div>
                <div class="metric-label">Memory Reduction</div>
            </div>
            <div class="metric-card">
                <div class="metric-value">1500+</div>
                <div class="metric-label">Concurrent Users</div>
            </div>
        </div>

        <!-- Throughput Performance Chart -->
        <div class="chart-container">
            <div class="chart-title">🔥 LLM Throughput Performance</div>
            <canvas id="throughputChart"></canvas>
            <div class="controls">
                <button class="download-btn" onclick="downloadChart('throughputChart', 'llm_throughput_metrics.png')">
                    📊 Download Throughput Chart
                </button>
            </div>
        </div>

        <!-- Quantization Comparison Chart -->
        <div class="chart-container">
            <div class="chart-title">⚡ INT8/INT4 Quantization Results</div>
            <canvas id="quantizationChart"></canvas>
            <div class="controls">
                <button class="download-btn" onclick="downloadChart('quantizationChart', 'quantization_comparison.png')">
                    🎯 Download Quantization Chart
                </button>
            </div>
        </div>

        <!-- Multi-GPU Scaling Chart -->
        <div class="chart-container">
            <div class="chart-title">🔗 Multi-GPU Scaling Performance</div>
            <canvas id="scalingChart"></canvas>
            <div class="controls">
                <button class="download-btn" onclick="downloadChart('scalingChart', 'multi_gpu_scaling.png')">
                    🚀 Download Scaling Chart
                </button>
            </div>
        </div>

        <div class="controls">
            <button class="download-btn" onclick="downloadAllCharts()" style="background: linear-gradient(45deg, #e74c3c, #f39c12);">
                📦 Download All Charts
            </button>
        </div>
    </div>

    <script>
        // Chart.js default settings
        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
        Chart.defaults.font.size = 14;

        // Throughput Performance Chart
        const throughputCtx = document.getElementById('throughputChart').getContext('2d');
        const throughputChart = new Chart(throughputCtx, {
            type: 'line',
            data: {
                labels: ['1 GPU', '2 GPUs', '4 GPUs', '8 GPUs'],
                datasets: [{
                    label: 'vLLM + Continuous Batching',
                    data: [3200, 6800, 12300, 18500],
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderWidth: 4,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#3498db',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 3,
                    pointRadius: 8
                }, {
                    label: 'Standard Transformers',
                    data: [800, 1500, 2800, 4200],
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.1)',
                    borderWidth: 4,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#e74c3c',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 3,
                    pointRadius: 8
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Throughput Comparison (Requests/Second)',
                        font: { size: 18, weight: 'bold' },
                        padding: 20
                    },
                    legend: {
                        display: true,
                        position: 'top',
                        labels: { padding: 20, font: { size: 14 } }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Requests per Second',
                            font: { size: 16, weight: 'bold' }
                        },
                        grid: { color: 'rgba(0,0,0,0.1)' }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Hardware Configuration',
                            font: { size: 16, weight: 'bold' }
                        },
                        grid: { color: 'rgba(0,0,0,0.1)' }
                    }
                },
                elements: {
                    point: { hoverRadius: 12 }
                }
            }
        });

        // Quantization Comparison Chart
        const quantizationCtx = document.getElementById('quantizationChart').getContext('2d');
        const quantizationChart = new Chart(quantizationCtx, {
            type: 'bar',
            data: {
                labels: ['FP16 Baseline', 'INT8 Quantized', 'INT4 Quantized'],
                datasets: [{
                    label: 'Memory Usage (GB)',
                    data: [28.5, 8.1, 7.2],
                    backgroundColor: ['#e74c3c', '#f39c12', '#27ae60'],
                    borderColor: ['#c0392b', '#e67e22', '#229954'],
                    borderWidth: 3,
                    borderRadius: 8,
                    borderSkipped: false
                }, {
                    label: 'Inference Speed (tokens/sec)',
                    data: [450, 1240, 1380],
                    backgroundColor: ['rgba(231, 76, 60, 0.3)', 'rgba(243, 156, 18, 0.3)', 'rgba(39, 174, 96, 0.3)'],
                    borderColor: ['#c0392b', '#e67e22', '#229954'],
                    borderWidth: 3,
                    borderRadius: 8,
                    borderSkipped: false,
                    yAxisID: 'y1'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Quantization Impact: Memory vs Speed',
                        font: { size: 18, weight: 'bold' },
                        padding: 20
                    },
                    legend: {
                        display: true,
                        position: 'top',
                        labels: { padding: 20, font: { size: 14 } }
                    }
                },
                scales: {
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: {
                            display: true,
                            text: 'Memory Usage (GB)',
                            font: { size: 16, weight: 'bold' }
                        },
                        grid: { color: 'rgba(0,0,0,0.1)' }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        title: {
                            display: true,
                            text: 'Tokens/Second',
                            font: { size: 16, weight: 'bold' }
                        },
                        grid: { drawOnChartArea: false }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Quantization Method',
                            font: { size: 16, weight: 'bold' }
                        },
                        grid: { color: 'rgba(0,0,0,0.1)' }
                    }
                }
            }
        });

        // Multi-GPU Scaling Chart
        const scalingCtx = document.getElementById('scalingChart').getContext('2d');
        const scalingChart = new Chart(scalingCtx, {
            type: 'radar',
            data: {
                labels: ['Throughput', 'Latency', 'Memory Efficiency', 'Concurrent Users', 'CUDA Utilization', 'Cost Efficiency'],
                datasets: [{
                    label: '1 GPU',
                    data: [25, 60, 70, 30, 85, 90],
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.2)',
                    borderWidth: 3,
                    pointBackgroundColor: '#e74c3c',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2
                }, {
                    label: '4 GPUs',
                    data: [85, 90, 85, 80, 95, 70],
                    borderColor: '#27ae60',
                    backgroundColor: 'rgba(39, 174, 96, 0.2)',
                    borderWidth: 3,
                    pointBackgroundColor: '#27ae60',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2
                }, {
                    label: '8 GPUs',
                    data: [95, 85, 90, 95, 98, 60],
                    borderColor: '#3498db',
                    backgroundColor: 'rgba(52, 152, 219, 0.2)',
                    borderWidth: 3,
                    pointBackgroundColor: '#3498db',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Multi-GPU Performance Scaling',
                        font: { size: 18, weight: 'bold' },
                        padding: 20
                    },
                    legend: {
                        display: true,
                        position: 'top',
                        labels: { padding: 20, font: { size: 14 } }
                    }
                },
                scales: {
                    r: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            stepSize: 20,
                            font: { size: 12 }
                        },
                        pointLabels: {
                            font: { size: 14, weight: 'bold' }
                        },
                        grid: { color: 'rgba(0,0,0,0.1)' },
                        angleLines: { color: 'rgba(0,0,0,0.1)' }
                    }
                },
                elements: {
                    point: { radius: 6, hoverRadius: 10 }
                }
            }
        });

        // Download function
        function downloadChart(chartId, filename) {
            const canvas = document.getElementById(chartId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        // Download all charts
        function downloadAllCharts() {
            setTimeout(() => downloadChart('throughputChart', 'llm_throughput_metrics.png'), 100);
            setTimeout(() => downloadChart('quantizationChart', 'quantization_comparison.png'), 200);
            setTimeout(() => downloadChart('scalingChart', 'multi_gpu_scaling.png'), 300);
        }

        // Add animation on load
        window.addEventListener('load', () => {
            document.querySelectorAll('.chart-container').forEach((container, index) => {
                container.style.opacity = '0';
                container.style.transform = 'translateY(30px)';
                setTimeout(() => {
                    container.style.transition = 'all 0.6s ease';
                    container.style.opacity = '1';
                    container.style.transform = 'translateY(0)';
                }, index * 200);
            });
        });
    </script>
</body>
</html>
