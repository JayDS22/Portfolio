name: Playwright tests

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'explore/**'
      - 'css/modern.css'
      - 'data/**'
      - 'tests/playwright/**'
      - '.github/workflows/playwright.yml'
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against (leave empty to use the local server)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install npm dependencies
        working-directory: tests/playwright
        run: npm ci

      - name: Install Chromium for Playwright
        working-directory: tests/playwright
        run: npx playwright install chromium --with-deps

      - name: Start local site
        if: ${{ inputs.base_url == '' }}
        run: |
          python3 -m http.server 4000 > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:4000/ > /dev/null; then
              echo "server up"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start"
          cat /tmp/server.log
          exit 1

      - name: Run Playwright tests
        working-directory: tests/playwright
        env:
          BASE_URL: ${{ inputs.base_url || 'http://127.0.0.1:4000' }}
        run: node test.mjs

      - name: Stop local site
        if: ${{ always() && inputs.base_url == '' }}
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

      - name: Upload screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/playwright/*.png
          if-no-files-found: ignore
          retention-days: 14
